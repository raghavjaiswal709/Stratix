<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16241d"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#glow)"/>

  <!-- drip from the S -->
  <g transform="skewX(-10)">
    <rect x="33" y="41" width="3.4" height="12" rx="1.7" fill="url(#drip)"/>
    <circle cx="34.7" cy="54" r="3" fill="#10b981"/>
    <circle cx="33.9" cy="53.2" r="0.9" fill="#ffffff" fill-opacity="0.7"/>
  </g>

  <!-- graffiti S: heavy italic skew, dark outline + white fill + emerald glow -->
  <g transform="translate(32 31) skewX(-11) rotate(-3) translate(-32 -31)" filter="url(#softGlow)">
    <text x="32" y="46" text-anchor="middle"
          font-family="'Arial Black','Archivo Black',sans-serif"
          font-size="46" font-weight="900" font-style="italic"
          fill="#ffffff" stroke="#000000" stroke-width="4"
          stroke-linejoin="round" paint-order="stroke fill">S</text>
  </g>
</svg>
