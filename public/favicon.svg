<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1310"/>
      <stop offset="0.5" stop-color="#080c0a"/>
      <stop offset="1" stop-color="#030504"/>
    </linearGradient>
    
    <!-- Radial Glow in Center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Slash (Trend Line) Gradient -->
    <linearGradient id="trendGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="0.6" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>

    <!-- S Ribbon Gradient (Clean Silver-White) -->
    <linearGradient id="sGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d1d5db"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow Filter for depth separation -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bgGrad)" stroke="#10b981" stroke-opacity="0.15" stroke-width="1.5"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#centerGlow)"/>

  <!-- Glowing Trend Line Slash (Behind S) -->
  <g filter="url(#neonGlow)">
    <line x1="16" y1="48" x2="48" y2="16" stroke="url(#trendGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 38 16 L 48 16 L 48 26" fill="none" stroke="url(#trendGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Stylized typographic S (Front) with Drop Shadow for separation -->
  <g filter="url(#shadow)">
    <!-- Outer thick dark path for outline contrast -->
    <path d="M 44 21 
             C 44 14, 20 14, 20 25 
             C 20 35, 44 29, 44 39 
             C 44 50, 20 50, 20 43" 
          fill="none" stroke="#000000" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
          
    <!-- Inner silver-white path -->
    <path d="M 44 21 
             C 44 14, 20 14, 20 25 
             C 20 35, 44 29, 44 39 
             C 44 50, 20 50, 20 43" 
          fill="none" stroke="url(#sGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
